# ZotWatch Configuration

zotero:
  mode: "api"
  api:
    user_id: "${ZOTERO_USER_ID}"
    api_key: "${ZOTERO_API_KEY}"
    page_size: 100
    polite_delay_ms: 200

sources:
  arxiv:
    enabled: false
    categories:
      - "physics.geo-ph"  # Geophysics (solid earth, mantle, tectonics)
      - "astro-ph.EP"     # Earth and Planetary Astrophysics
    days_back: 7
    max_results: 500
  crossref:
    enabled: true
    mailto: "${CROSSREF_MAILTO}"
    days_back: 7
    max_results: 3000
  # EarthArXiv preprints (Earth sciences via OSF)
  eartharxiv:
    enabled: true  # Enable to get Earth science preprints
    days_back: 14
    max_results: 500
  # Abstract scraper (Camoufox + rule-based + LLM fallback)
  scraper:
    enabled: true
    rate_limit_delay: 1.0
    timeout: 60000
    max_retries: 2
    max_html_chars: 15000
    llm_max_tokens: 1024
    llm_temperature: 0.1
    use_llm_fallback: true
  # Followed authors (OpenAlex API)
  # Fetches all papers by specified authors. First run = full pull, then daily incremental.
  # These papers skip scoring/ranking/TopK - only deduplication is applied.
  followed_authors:
    enabled: true
    polite_email: "${CROSSREF_MAILTO}"
    max_results_per_author: 10000
    authors:
      - name: "汪在聪"
        id: "0000-0002-3584-1673"   # ORCID
      - name: "JB Walters"
        id: "0000-0002-1275-8826"   # ORCID
      - name: "刘勇胜"
        id: "0000-0002-9340-9205"   # ORCID
      - name: "李继磊"
        id: "0000-0002-5847-4642"   # ORCID
      - name: "Esther M. Schwarzenbach"
        id: "0000-0002-4549-4660"   # ORCID
      - name: "Jay J. Ague"
        id: "0000-0001-8408-0279"   # ORCID
      - name: "E.M. Stewart"
        id: "0000-0002-5092-3140"   # ORCID
scoring:
  # Threshold configuration: controls how papers are labeled (must_read/consider/ignore)
  thresholds:
    mode: "dynamic"  # "fixed" (static thresholds) or "dynamic" (percentile-based)
    must_read: 0.75  # Fixed mode: must_read threshold
    consider: 0.55   # Fixed mode: consider threshold
    dynamic:         # Dynamic mode: percentile-based thresholds
      must_read_percentile: 95  # Top 5% as must_read
      consider_percentile: 70   # 70th-95th percentile as consider
      min_must_read: 0.55       # Minimum score floor for must_read
      min_consider: 0.35        # Minimum score floor for consider

  # User research interests for interest-based recommendations (optional)
  interests:
    enabled: true
    description: |
      我是一名地球化学/岩石学方向的研究者，重点关注以下研究方向：
      1) 深部地幔岩浆过程以及俯冲过程中亲铜元素（Cu、Ag、Au 等）与金属同位素行为；
      2) 大洋—大陆俯冲带中金属元素与挥发分（以硫、卤素和碳为主）的起源、迁移与循环；
      3) 亲铜元素相关的成矿过程、资源潜力与环境效应；
      4) 我只关注地学领域的研究(geochemistry, petrology, volcanology, geology, mineralogy)。
      
      【重要：请明确排除以下领域】
      - 材料科学(materials science)：如纳米材料、电池材料、催化剂、薄膜、合金、半导体、聚合物、涂层
      - 化学工程(chemical engineering)：如化工反应器、分离工艺、萃取工业
      - 生物医学(biomedical)：如药物递送、生物传感器、医用材料
      - 环境工程(environmental engineering)：如废水处理、污染物降解、吸附材料
      - 食品科学、农业化学、电化学电池、光电材料、超导材料、磁性材料
    max_documents: 500  # Max documents for FAISS recall (Voyage limit: 1000, DashScope: 500)
    top_k_interest: 5  # Final interest-based papers count
    # Semantic similarity filter (interest description vs candidate title/abstract)
    semantic_filter_enabled: true
    semantic_filter_min_similarity: 0.22
    semantic_filter_max_candidates: 1000
    # Static include keywords: keep only candidates that match at least one keyword
    include_keywords:
      # Core disciplines
      - "geochemistry"
      - "petrology"
      - "geology"
      - "volcanology"
      - "mineralogy"
      - "geophysics"
      - "tectonics"
      - "geochronology"
      - "geodesy"
      # Mantle & magma processes
      - "mantle"
      - "subduction"
      - "arc magma"
      - "magma"
      - "volcanic"
      - "volcanism"
      - "magmatic"
      - "melt inclusion"
      - "mid-ocean ridge"
      - "hotspot"
      - "lithosphere"
      - "asthenosphere"
      # Minerals & rocks
      - "basalt"
      - "granite"
      - "peridotite"
      - "olivine"
      - "pyroxene"
      - "garnet"
      - "zircon"
      - "feldspar"
      - "amphibole"
      - "serpentinite"
      # Chalcophile & ore elements
      - "chalcophile"
      - "sulfide"
      - "ore deposit"
      - "ore-forming"
      - "porphyry"
      - "copper"
      - "gold"
      - "silver"
      - "mineralization"
      - "hydrothermal"
      # Isotopes & geochemical tracers
      - "isotope"
      - "isotopic"
      - "trace element"
      - "rare earth"
      - "platinum group"
      # Volatiles & fluids
      - "volatile"
      - "sulfur"
      - "halogen"
      - "degassing"
      - "fluid inclusion"
      # Earth structure & processes
      - "oceanic crust"
      - "continental crust"
      - "plate tectonic"
      - "metamorphism"
      - "metamorphic"
      - "sediment"
      - "seismic"
      - "earthquake"
    # Require at least N keyword matches in title/abstract to keep
    include_min_matches: 1
    # Match fields: ["title"], ["abstract"], or ["title", "abstract"]
    include_match_fields:
      - "title"
      - "abstract"
    # Static exclude keywords (case-insensitive, applied to ALL candidates)
    # 用于过滤 Nature/Science 等综合性期刊中的非地学文章
    exclude_keywords:
      # ===== Materials Science & Engineering =====
      - "nanomaterial"
      - "nanoparticle"
      - "nanocomposite"
      - "nanotube"
      - "graphene"
      - "thin film"
      - "thin-film"
      - "battery"
      - "lithium-ion"
      - "lithium ion"
      - "electrode"
      - "anode"
      - "cathode"
      - "electrochemical cell"
      - "photovoltaic"
      - "solar cell"
      - "superconductor"
      - "semiconductor"
      - "transistor"
      - "polymer"
      - "coating"
      - "alloy"
      - "catalyst"
      - "photocatalyst"
      - "electrocatalyst"
      - "metamaterial"
      - "meta-lens"
      - "metasurface"
      
      # ===== Physics (Quantum/Optics/Condensed Matter) =====
      - "quantum computing"
      - "quantum bit"
      - "qubit"
      - "quantum entanglement"
      - "superposition"
      - "quantum spin"
      - "levitating magnet"
      - "metal-insulator transition"
      - "wavefront shaping"
      - "photonics"
      - "optical fiber"
      - "laser"
      - "plasmon"
      - "phosphorescence"
      - "LED"
      - "light-emitting"
      
      # ===== Biomedical & Pharmaceutical =====
      - "drug delivery"
      - "biosensor"
      - "biomedical"
      - "pharmaceutical"
      - "therapeutic"
      - "nanocarrier"
      - "tissue engineering"
      - "clinical trial"
      - "cancer therapy"
      - "tumor"
      - "chemotherapy"
      - "immunotherapy"
      - "antibody"
      - "vaccine"
      - "analgesia"
      - "pain relief"
      - "depression"
      - "nanobody"
      
      # ===== Molecular Biology & Genetics =====
      - "gene expression"
      - "gene regulation"
      - "CRISPR"
      - "genome editing"
      - "transcription"
      - "mRNA"
      - "protein folding"
      - "enzyme catalysis"
      - "polysaccharide"
      - "endocytosis"
      - "cell signaling"
      - "neural"
      - "neuron"
      - "brain"
      - "synapse"
      
      # ===== Agricultural & Food Science =====
      - "food science"
      - "food processing"
      - "agrochemical"
      - "transgenic rice"
      - "crop yield"
      - "plant breeding"
      - "pesticide"
      
      # ===== Environmental Engineering (non-geological) =====
      - "wastewater"
      - "sewage"
      - "pollutant degradation"
      - "adsorption material"
      - "membrane separation"
      - "gas separation"
      - "xenon"
      - "krypton"
      - "coordination framework"
      - "metal-organic framework"
      - "MOF"
      - "sorbent"
      - "adsorbent"
      - "drinking water treatment"
      - "air pollution"
      
      # ===== Other Non-Geoscience =====
      - "woven metamaterial"
      - "3D printing"
      - "additive manufacturing"
      - "artificial intelligence"
      - "machine learning"
      - "deep learning"
      - "neural network"
      - "daily briefing"
      - "news feature"
    # LLM relevance filter (semantic filtering using title + abstract)
    llm_relevance_filter_enabled: false
    llm_relevance_batch_size: 20
    llm_relevance_max_candidates: 200


  # Micro/Macro fusion scoring configuration
  fusion:
    micro_weight: 0.65  # α: weight for micro-level score (1-α for macro)
    knn_neighbors: 5    # Number of neighbors for k-NN scoring
    # Similarity gate: filter out candidates with low relevance to your library
    # This is the key setting to filter Nature/Science papers not related to geoscience
    similarity_gate_enabled: true
    min_similarity: 0.20  # Minimum similarity threshold (0.0-1.0, higher = stricter)

  # Rerank settings (only used when interests.enabled=true)
  # Provider MUST match embedding.provider when interests are enabled
  rerank:
    provider: "dashscope"  # Options: "voyage" or "dashscope"
    model: "qwen3-rerank"  # voyage: rerank-2/rerank-2.5, dashscope: qwen3-rerank

  # Journal impact factor scoring configuration
  journal:
    arxiv_score: 0.6          # Score for arXiv preprints
    chinese_core_score: 0.7   # Score for Chinese core journals
    unknown_score: 0.3        # Score for unknown journals
    log_base: 25.0            # Log base for IF normalization

  # Final score composition weights
  # score = similarity_weight * similarity + impact_factor_weight * if_score
  final_weights:
    similarity_weight: 0.8      # Weight for embedding similarity
    impact_factor_weight: 0.2   # Weight for journal impact factor

  # Flagship-journal geoscience track
  # Articles from these journals pass a field-level geoscience gate (anchor
  # embedding + optional LLM fallback) instead of the personal similarity
  # filter, and appear in their own "顶刊地学速览" section.
  flagship:
    enabled: false
    issns:                       # Nature, Science, NC, SA, PNAS, Nature sub-journals, Comm Earth & Env ...
      - "0028-0836"              # Nature
      - "1476-4687"              # Nature (online)
      - "0036-8075"              # Science
      - "1095-9203"              # Science (online)
      - "2041-1723"              # Nature Communications
      - "2375-2548"              # Science Advances
      - "2662-4435"              # Communications Earth & Environment
      - "1091-6490"              # PNAS
      - "0027-8424"              # PNAS (print)
      - "1752-0894"              # Nature Geoscience
      - "1752-0908"              # Nature Geoscience (online)
      - "2662-138X"              # Nature Reviews Earth & Environment
    # Field anchors for the geoscience gate (English, matched against abstracts)
    positive_anchor: "Solid Earth geoscience: igneous, metamorphic and sedimentary petrology, geochemistry and isotope geochemistry, mineralogy, tectonics and structural geology, geochronology, ore deposits and economic geology, volcanology, the deep Earth, stratigraphy, and paleontology / paleobiology."
    negative_anchor: "Atmospheric science, meteorology, climate dynamics, air quality, weather and atmospheric circulation."
    min_score: 0.35              # positive-anchor cosine >= this -> accept
    gray_low: 0.28               # < this -> reject; in between -> gray zone
    llm_fallback: true           # judge gray-zone articles with the LLM
    llm_boundary: "Solid-earth geoscience or paleontology (petrology, geochemistry, mineralogy, tectonics, geochronology, ore deposits, stratigraphy, paleontology). EXCLUDE pure atmospheric science, meteorology and climate dynamics."
    llm_batch_size: 20
    max_results: 30

# Embedding configuration (provider MUST match rerank.provider when interests are enabled)
embedding:
  provider: "dashscope"  # Options: "voyage" or "dashscope"
  model: "text-embedding-v4"  # voyage: voyage-3.5, dashscope: text-embedding-v3
  api_key: "${DASHSCOPE_API_KEY}"  # voyage: VOYAGE_API_KEY, dashscope: DASHSCOPE_API_KEY
  batch_size: 10  # For DashScope models, must be <=10

# LLM configuration for AI summaries and translation
llm:
  enabled: true
  provider: "openrouter"  # Options: "kimi", "openrouter", or "deepseek"
  api_key: "${OPENROUTER_API_KEY}"  # kimi: MOONSHOT_API_KEY
  model: "deepseek-v4-pro"
  max_tokens: 5120
  temperature: 0.3
  retry:
    max_attempts: 3
    backoff_factor: 2.0
    initial_delay: 1.0
  translation:
    enabled: true  # Translate English titles to Chinese
  domain_classification:
    enabled: true  # Classify papers into research domains
    batch_size: 20
    max_workers: 3
    domains:  # Custom domains for geoscience (empty = use defaults)
      - "地球化学"
      - "岩石学"
      - "矿物学"
      - "火山学"
      - "构造地质学"
      - "地震学"
      - "大地测量学"
      - "地球物理学"
      - "海洋地质"
      - "古气候与古环境"
      - "遥感与GIS"
      - "水文地质学"
      - "矿床学与成矿"
      - "环境地球化学"
      - "行星科学"
      - "其他"

# Output Configuration
output:
  timezone: "Asia/Shanghai"  # IANA timezone name (e.g., "UTC", "America/New_York")
  rss:
    title: "ZotWatch Feed"
    link: "https://ehehe.cn/zotwatch/"
    description: "AI-assisted literature watch"
  html:
    template: "report.html"
    include_summaries: true

# Profile analysis configuration
profile:
  exclude_tags:  # Drop these tags during Zotero ingest (personal markers)
    - "⏳"
    - "✔️"
    - "💎"
    - "/done"
    - "/reading"
    - "/unread"
    - "⭐"
    - "⭐⭐"
    - "⭐⭐⭐"
    - "⭐⭐⭐⭐"
    - "⭐⭐⭐⭐⭐"
  author_min_count: 5  # Minimum appearances for "frequent author"
  # Clustering configuration for semantic grouping of research papers
  # Uses adaptive Silhouette-based clustering with automatic k selection
  clustering:
    enabled: true
    max_clusters: 35               # Upper limit on cluster count
    min_clusters: 5                # Lower limit on cluster count (prevents too few clusters)
    min_cluster_size: 1            # Minimum papers per valid cluster (1 = allow single-paper clusters)
    biased_k_tolerance_percent: 0.20  # Within 20% of best Silhouette score, select the largest k
    generate_labels: true          # Use LLM to generate cluster labels
    # Temporal weighting for time-decay of paper relevance
    temporal:
      enabled: false
      halflife_days: 365           # Papers half as relevant after 6 months
      min_weight: 0.05             # Floor weight for very old papers

# Watch pipeline configuration
watch:
  recent_days: 7          # Filter papers older than N days
  max_preprint_ratio: 0.7 # Max preprint ratio in results (lowered to balance sources)
  top_k: 30               # Default recommendation count
  require_abstract: true  # Filter out papers without abstracts
